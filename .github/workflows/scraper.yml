name: Run Scraper

on:
  schedule:
    - cron: "01 16 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: 'America/Los_Angeles' # Replace with your timezone (e.g., 'America/New_York')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright==1.58.0 greenlet==3.3.1
          # This specific command handles the libasound2t64 mapping on Ubuntu 24.04
          python -m playwright install --with-deps firefox

      - name: Run scraper
        run: python scraper.py

      - name: Debug - List Files
        run: |
          echo "Current directory structure:"
          ls -R scraped_data* || echo "No scraped_data folders found"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: Update FFXIV rankings (All Regions)"
          # This pattern ensures all regional folders are captured
          file_pattern: "scraped_data*/*.csv"
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"
