name: Run Scraper

on:
  schedule:
    - cron: "30 15 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install --with-deps firefox

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push new CSV files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: Update FFXIV rankings (All Regions)"
          add_options: "--all"
          # Updated pattern to include all folders starting with 'scraped_data'
          file_pattern: "scraped_data*/**/*.csv" 
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"
